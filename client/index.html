<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title -->
  <title>CampusIQ | AI Talent Discovery Platform</title>

  <!-- SEO -->
  <meta name="description" content="CampusIQ is an AI-powered platform that helps discover student talents, skills, and achievements across campus." />

  <!-- Open Graph -->
  <meta property="og:title" content="CampusIQ - Talent Discovery Platform" />
  <meta property="og:description" content="AI-powered system for discovering student talent and achievements." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/preview.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="CampusIQ - AI Talent Discovery" />
  <meta name="twitter:description" content="Discover campus talent with AI-powered insights." />
  <meta name="twitter:image" content="/preview.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Base Styling -->
  <style>
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: #0f172a;
      color: white;
    }

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #020617;
      font-size: 18px;
      letter-spacing: 1px;
    }

    .logo {
      font-weight: 700;
      font-size: 22px;
      color: #3b82f6;
    }

    .tagline {
      font-size: 14px;
      opacity: 0.7;
      margin-top: 5px;
      text-align: center;
    }
  </style>

</head>

<body>

  <!-- Loading Screen -->
  <div id="loader">
    <div>
      <div class="logo">CampusIQ</div>
      <div class="tagline">Loading AI Talent Engine...</div>
    </div>
  </div>

  <!-- React App -->
  <div id="root"></div>

  <script>
    window.addEventListener("load", () => {
      const loader = document.getElementById("loader");
      if (loader) loader.style.display = "none";
    });
  </script>

  <!-- React Entry -->
  <script type="module" src="/src/main.tsx"></script>

</body>
</html>
